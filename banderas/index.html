<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seguimiento de pedidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="app.js" defer></script>
  </head>
  <body
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 px-4"
  >
    <!-- Card Glass -->
    <div
      class="w-full max-w-md p-8 rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10 shadow-2xl transition-all duration-500 hover:scale-[1.01]"
    >
      <!-- Título -->
      <div class="text-center mb-8 animate-fade-in">
        <h1 class="text-3xl font-bold text-gray-100 tracking-wide">PEDIDOS</h1>
      </div>

      <!-- Info del empleado (oculto por defecto) -->
      <div
        id="infoEmpleado"
        class="hidden mb-6 p-4 rounded-xl bg-white/10 border border-white/20 backdrop-blur-md text-gray-200 transition-all duration-300"
      >
        <div class="flex justify-between items-center">
          <div>
            <p class="text-xs text-gray-400">Empleado</p>
            <p id="codigoEmpleadoMostrado" class="font-semibold tracking-wide">
              ---
            </p>
          </div>

          <div class="text-right">
            <p class="text-xs text-gray-400">Rol</p>
            <p
              id="rolEmpleadoMostrado"
              class="font-semibold text-green-400 tracking-wide"
            >
              ---
            </p>
          </div>
        </div>
      </div>

      <!-- Form -->
      <div class="space-y-6">
        <!-- Código -->
        <div class="relative group">
          <label for="codigo" class="block text-sm text-gray-300 mb-2">
            Pedido
          </label>

          <!-- Icono -->
          <div
            class="absolute left-3 top-[42px] text-gray-400 group-focus-within:text-gray-200 transition"
          >
            <!-- Icono clave -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 7a4 4 0 10-8 0v4H5a2 2 0 00-2 2v3a2 2 0 002 2h8a2 2 0 002-2v-3a2 2 0 00-2-2h-2V7z"
              />
            </svg>
          </div>

          <input
            type="text"
            id="codigo"
            placeholder="Escanee el código"
            class="w-full pl-10 pr-4 py-3 rounded-xl bg-white/10 text-gray-100 placeholder-gray-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-gray-400/40 focus:border-white/40 transition-all duration-300"
          />
        </div>

        <!-- Bandera -->
        <div class="relative group">
          <label class="block text-sm text-gray-300 mb-2"> Bandera </label>

          <!-- Icono -->
          <div
            class="absolute left-3 top-[42px] text-gray-400 group-focus-within:text-gray-200 transition"
          >
            <!-- Icono lista -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5h10M9 12h10M9 19h10M4 6h.01M4 13h.01M4 20h.01"
              />
            </svg>
          </div>

          <textarea
            id="bandera"
            placeholder="Ej. Bandera 1"
            rows="2"
            class="w-full pl-10 pr-4 py-3 rounded-xl bg-white/10 text-gray-100 placeholder-gray-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-gray-400/40 focus:border-white/40 transition-all duration-300 resize-none"
            disabled
          ></textarea>
        </div>

        <!-- Boton para roles de surtidor -->
        <button
          id="btnMC"
          type="button"
          class="hidden w-full py-3 rounded-xl font-semibold bg-white/10 backdrop-blur-md border border-white/20 text-gray-100 hover:bg-white/20 hover:shadow-lg active:scale-95 transition-all duration-300"
        ></button>

        <button
          id="btnAE"
          type="button"
          class="hidden w-full py-3 rounded-xl font-semibold bg-white/10 backdrop-blur-md border border-white/20 text-gray-100 hover:bg-white/20 hover:shadow-lg active:scale-95 transition-all duration-300"
        ></button>

        <!-- Boton para rol de verificador -->
        <button
          id="btnVerificador"
          type="button"
          class="hidden w-full py-3 rounded-xl font-semibold bg-white/10 backdrop-blur-md border border-white/20 text-gray-100 hover:bg-white/20 hover:shadow-lg active:scale-95 transition-all duration-300"
        >
          Verificar pedido
        </button>
      </div>
    </div>

    <!-- Modal empleado -->
    <div
      id="modalEmpleado"
      class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
    >
      <div
        class="w-full max-w-sm mx-4 p-6 rounded-2xl bg-white/10 backdrop-blur-xl border border-white/20 shadow-2xl"
      >
        <h2 class="text-lg font-semibold text-gray-100 mb-4 text-center">
          Identificación de empleado
        </h2>

        <div class="relative">
          <input
            type="text"
            id="inputEmpleadoModal"
            placeholder="Ingrese su código"
            class="w-full pl-4 pr-4 py-3 rounded-xl bg-white/10 text-gray-100 placeholder-gray-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-gray-400/40 focus:border-white/40 transition-all duration-300"
          />
        </div>

        <div class="flex gap-3 mt-5">
          <button
            id="btnCancelarModal"
            class="flex-1 py-2 rounded-xl text-gray-300 border border-white/20 bg-white/5 hover:bg-white/10 transition-all duration-300"
          >
            Cancelar
          </button>
          <button
            id="btnConfirmarModal"
            class="flex-1 py-2 rounded-xl font-semibold text-gray-100 bg-white/20 border border-white/30 hover:bg-white/30 transition-all duration-300"
          >
            Confirmar
          </button>
        </div>
      </div>
    </div>

    <!-- Toast notificación -->
    <!-- Toast notificación -->
    <div
      id="toast"
      class="hidden fixed inset-0 z-50 flex items-center justify-center pointer-events-none"
    >
      <div
        id="toastInner"
        class="mx-4 w-full max-w-sm px-8 py-5 rounded-2xl text-base font-medium text-center backdrop-blur-md shadow-2xl border transition-all duration-500"
      >
        <p id="toastMensaje"></p>
      </div>
    </div>
  </body>
</html>
